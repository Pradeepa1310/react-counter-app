<!DOCTYPE html>
<html>
<head>
    <title>React State Management</title>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <style>
        body {
            font-family: "Times New Roman";
            text-align: center;
            background: #c3a492;
        }

        .container {
            margin-top: 80px;
            background: rgb(205, 214, 247);
            padding: 30px;
            width: 300px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgb(205, 144, 151);
        }

        button {
            padding: 10px 15px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">

        function Counter() {
            const [count, setCount] = React.useState(0);

            return (
                <div className="container">
                    <h2>React Counter App</h2>

                    <h1>{count}</h1>

                    <button onClick={() => setCount(count + 1)}>
                        Increase
                    </button>

                    <button onClick={() => setCount(count - 1)}>
                        Decrease
                    </button>
                </div>
            );
        }

        function App() {
            return (
                <div>
                    <Counter />
                </div>
            );
        }

        const root = ReactDOM.createRoot(
            document.getElementById("root")
        );

        root.render(<App />);

    </script>
</body>
</html>
